<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-back-button defaultHref="/sindico/home" text="Voltar"></ion-back-button></ion-buttons>
    <ion-title>Avisos</ion-title>
    <ion-buttons slot="end">
      <ion-button *ngIf="ehSindico" (click)="abrirFormulario()"><ion-icon name="add-outline"></ion-icon></ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)"><ion-refresher-content></ion-refresher-content></ion-refresher>
  <div *ngIf="carregando" style="text-align:center;padding:60px"><ion-spinner color="primary"></ion-spinner></div>
  <div *ngIf="!carregando && avisos.length===0" style="text-align:center;padding:60px">
    <div style="font-size:64px;margin-bottom:16px">📢</div>
    <p style="color:#8890B5;margin-bottom:24px">Nenhum aviso publicado ainda</p>
    <button *ngIf="ehSindico" (click)="abrirFormulario()" style="background:linear-gradient(135deg,#00C896,#00a07a);border:none;border-radius:12px;color:#0F1225;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer">+ Criar aviso</button>
  </div>
  <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
    <div *ngFor="let a of avisos" style="background:#1E2444;border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,0.05)" [style.border-left]="a.urgente ? '4px solid #FF6482' : a.fixado ? '4px solid #FFD166' : '4px solid #2A3158'">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <span *ngIf="a.urgente" style="background:rgba(255,100,130,0.15);color:#FF6482;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px">🚨 URGENTE</span>
          <span *ngIf="a.fixado" style="background:rgba(255,209,102,0.15);color:#FFD166;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px">📌 Fixado</span>
        </div>
        <div *ngIf="ehSindico" style="display:flex;gap:8px">
          <button (click)="abrirFormulario(a)" style="background:rgba(0,200,150,0.15);border:none;border-radius:8px;color:#00C896;padding:6px 10px;cursor:pointer;font-size:13px">✏️ Editar</button>
          <button (click)="confirmarDelete(a)" style="background:rgba(255,100,130,0.15);border:none;border-radius:8px;color:#FF6482;padding:6px 10px;cursor:pointer;font-size:13px">🗑️ Excluir</button>
        </div>
      </div>
      <h3 style="color:#F5F7FF;font-size:16px;font-weight:700;margin:0 0 8px">{{ a.titulo }}</h3>
      <p style="color:#C5C9E0;font-size:14px;line-height:1.6;margin:0 0 12px">{{ a.conteudo }}</p>
      <div style="display:flex;justify-content:space-between;color:#8890B5;font-size:12px">
        <span>👤 {{ a.autor_nome }}</span>
        <span>🕐 {{ a.criado_em | date:'dd/MM/yyyy HH:mm' }}</span>
      </div>
    </div>
  </div>
  <div *ngIf="formularioAberto" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:flex-end;justify-content:center" (click)="fecharFormulario()">
    <div style="background:#1E2444;border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto" (click)="$event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px 0">
        <h3 style="color:#F5F7FF;font-size:18px;font-weight:700;margin:0">{{ editando ? 'Editar Aviso' : 'Novo Aviso' }}</h3>
        <button (click)="fecharFormulario()" style="background:rgba(255,255,255,0.1);border:none;border-radius:50%;width:32px;height:32px;color:#F5F7FF;cursor:pointer">✕</button>
      </div>
      <div style="padding:20px 24px 32px">
        <div style="margin-bottom:16px">
          <label style="display:block;color:#8890B5;font-size:12px;font-weight:600;text-transform:uppercase;margin-bottom:8px">Título *</label>
          <input [(ngModel)]="novoAviso.titulo" placeholder="Ex: Manutenção na piscina" style="width:100%;padding:12px 14px;background:#0F1225;border:1.5px solid #2A3158;border-radius:10px;color:#F5F7FF;font-size:15px;box-sizing:border-box;outline:none"/>
        </div>
        <div style="margin-bottom:16px">
          <label style="display:block;color:#8890B5;font-size:12px;font-weight:600;text-transform:uppercase;margin-bottom:8px">Conteúdo *</label>
          <textarea [(ngModel)]="novoAviso.conteudo" rows="5" placeholder="Descreva o aviso..." style="width:100%;padding:12px 14px;background:#0F1225;border:1.5px solid #2A3158;border-radius:10px;color:#F5F7FF;font-size:15px;box-sizing:border-box;outline:none;font-family:inherit;resize:vertical"></textarea>
        </div>
        <div style="display:flex;gap:24px;margin-bottom:20px">
          <label style="display:flex;align-items:center;gap:8px;color:#C5C9E0;cursor:pointer">
            <input type="checkbox" [(ngModel)]="novoAviso.urgente" style="width:18px;height:18px;accent-color:#FF6482"/> 🚨 Urgente
          </label>
          <label style="display:flex;align-items:center;gap:8px;color:#C5C9E0;cursor:pointer">
            <input type="checkbox" [(ngModel)]="novoAviso.fixado" style="width:18px;height:18px;accent-color:#FFD166"/> 📌 Fixar no topo
          </label>
        </div>
        <button (click)="salvar()" style="width:100%;padding:16px;background:linear-gradient(135deg,#00C896,#00a07a);border:none;border-radius:12px;color:#0F1225;font-size:16px;font-weight:700;cursor:pointer">
          {{ editando ? '💾 Salvar alterações' : '📢 Publicar aviso' }}
        </button>
      </div>
    </div>
  </div>

  <!-- Barra de navegação inferior -->
  <div style="position:fixed;bottom:0;left:0;right:0;background:#1A1F3C;border-top:1px solid rgba(255,255,255,0.08);display:flex;z-index:200">
    <button onclick="history.back()" style="flex:1;padding:14px;background:transparent;border:none;color:#8890B5;font-size:12px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px">
      <span style="font-size:20px">←</span>
      Voltar
    </button>
    <button onclick="window.location.href='/#/porteiro/home'" style="flex:1;padding:14px;background:transparent;border:none;color:#00C896;font-size:12px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px">
      <span style="font-size:20px">🏠</span>
      Início
    </button>
  </div>
  <!-- Espaço para a barra inferior -->
  <div style="height:70px"></div>
</ion-content>
