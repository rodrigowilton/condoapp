<ion-content>
  <div class="login-bg">
    <div class="login-container">
      <div class="login-header">
        <div class="logo-circle">🏘️</div>
        <h1>CondoApp</h1>
        <p>Gestão inteligente do seu condomínio</p>
      </div>
      <div class="login-card">
        <h2>Bem-vindo de volta</h2>
        <p class="login-sub">Entre com suas credenciais</p>
        <div class="field-group">
          <label>E-mail</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input type="email" [(ngModel)]="email" placeholder="seu@email.com"/>
          </div>
        </div>
        <div class="field-group">
          <label>Senha</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input [type]="mostrarSenha ? 'text' : 'password'" [(ngModel)]="senha" placeholder="••••••••"/>
            <button class="toggle-senha" (click)="mostrarSenha = !mostrarSenha">{{ mostrarSenha ? '🙈' : '👁️' }}</button>
          </div>
        </div>
        <div class="erro-box" *ngIf="erro">⚠️ {{ erro }}</div>
        <button class="btn-entrar" (click)="entrar()" [disabled]="carregando">
          <span *ngIf="!carregando">Entrar →</span>
          <span *ngIf="carregando">Entrando...</span>
        </button>
        <div class="login-footer">
          <p>contato&#64;streetonline.com.br</p>
          <p>📱 (27) 99273-4399</p>
        </div>
      </div>
      <p class="versao">CondoApp v1.0 · Todos os direitos reservados</p>
    </div>
  </div>
</ion-content>
