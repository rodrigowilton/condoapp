<!-- src/app/pages/login/login.page.html -->
<ion-content class="login-content">
  <div class="login-wrapper">

    <div class="login-logo">
      <div class="logo-icon">🏘️</div>
      <h1>CondoApp</h1>
      <p>Gestão inteligente do seu condomínio</p>
    </div>

    <div class="login-card">
      <h2>Entrar</h2>

      <ion-item lines="none" class="input-item">
        <ion-label position="floating">E-mail</ion-label>
        <ion-input type="email" [(ngModel)]="email" placeholder="seu@email.com"></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-item">
        <ion-label position="floating">Senha</ion-label>
        <ion-input [type]="mostrarSenha ? 'text' : 'password'" [(ngModel)]="senha"></ion-input>
        <ion-button fill="clear" slot="end" (click)="mostrarSenha = !mostrarSenha">
          <ion-icon [name]="mostrarSenha ? 'eye-off' : 'eye'"></ion-icon>
        </ion-button>
      </ion-item>

      <div *ngIf="erro" class="erro-msg">
        <ion-icon name="alert-circle"></ion-icon> {{ erro }}
      </div>

      <ion-button expand="block" class="btn-login" (click)="entrar()" [disabled]="carregando">
        <ion-spinner *ngIf="carregando" name="crescent"></ion-spinner>
        <span *ngIf="!carregando">Entrar</span>
      </ion-button>
    </div>

    <p class="versao">CondoApp v1.0</p>
  </div>
</ion-content>
