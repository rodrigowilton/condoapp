<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-back-button defaultHref="/gerencial/dashboard" text="Voltar"></ion-back-button></ion-buttons>
    <ion-title>👤 Usuários</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)"><ion-refresher-content></ion-refresher-content></ion-refresher>
  <div *ngIf="carregando" style="text-align:center;padding:60px"><ion-spinner color="primary"></ion-spinner></div>
  <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
    <div *ngFor="let u of usuarios" style="background:#1E2444;border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,0.05)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <h3 style="color:#F5F7FF;font-size:16px;font-weight:700;margin:0 0 4px">{{ u.nome }}</h3>
          <p style="color:#8890B5;font-size:13px;margin:0 0 2px">{{ u.email }}</p>
          <p style="color:#8890B5;font-size:12px;margin:0">{{ u.perfil }} {{ u.condominio_nome ? '· ' + u.condominio_nome : '' }}</p>
        </div>
        <span [style.background]="u.bloqueado?'rgba(255,100,130,0.15)':'rgba(0,200,150,0.15)'"
              [style.color]="u.bloqueado?'#FF6482':'#00C896'"
              style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px">
          {{ u.bloqueado ? '🔒 Bloqueado' : '✅ Ativo' }}
        </span>
      </div>
      <div style="display:flex;gap:8px">
        <button (click)="bloquear(u)" [style.background]="u.bloqueado?'rgba(0,200,150,0.15)':'rgba(255,100,130,0.15)'" [style.color]="u.bloqueado?'#00C896':'#FF6482'"
          style="flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer">
          {{ u.bloqueado ? '🔓 Desbloquear' : '🔒 Bloquear' }}
        </button>
      </div>
    </div>
  </div>
  <!-- Nav bar -->
  <div style="position:fixed;bottom:0;left:0;right:0;background:#1A1F3C;border-top:1px solid rgba(255,255,255,0.08);display:flex;z-index:200">
    <button onclick="history.back()" style="flex:1;padding:14px;background:transparent;border:none;color:#8890B5;font-size:12px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px">
      <span style="font-size:20px">←</span>Voltar
    </button>
    <button onclick="window.location.href='/#/gerencial/dashboard'" style="flex:1;padding:14px;background:transparent;border:none;color:#00C896;font-size:12px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px">
      <span style="font-size:20px">🏠</span>Início
    </button>
  </div>
  <div style="height:70px"></div>
</ion-content>
